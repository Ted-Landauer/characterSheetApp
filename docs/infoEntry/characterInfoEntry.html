<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Character Info Entry</title>
	<link href="dataEntry.css" rel="stylesheet" />
</head>

<body>
	<a href="../index.html">< Back to Sheet</a><br>
	
	<!-- action="" method="POST" -->
	
	<form id="FullForm" class="CharacterInfoForm">
	
		<div name="tempName" class="CharacterInfoForm" id="CharacterIdInfo">
			<div class="NameClassLevel">
				<label for="CharacterName" id="CharacterNameLabel" >Character Name:</label>
				<input name="charName" type="text" id="CharacterName" placeholder="Enter Character Name" required />
				
		
				<label for="CharacterClass" id="CharacterClassLabel" >Classes:</label>
				<input name="charClass" type="text" id="CharacterClass" placeholder="fighter, cleric, ..." required /><br>
				<sub for="CharacterClass" id="ClassHelper" >If multiclassing, enter all classes seperated by ", "</sub>
				
				
				<label for="CharacterClassLevels" id="CharacterLevelsLabel" >Level:</label>
				<input name="charLevel" type="text" id="CharacterClassLevels" placeholder="3, 5, ..." required />
				<sub for="CharacterClassLevels" id="LevelHelper" >If multiclassing, enter class levels seperated by ", " in the same order that you entered your classes above</sub>
				
			</div>
			
			<br><br>
			
			<div class="SpeciesSpeeds">
				<label for="CharacterSpecies" id="SpeciesLabel" >Species:</label>
				<input name="charSpecies" type="text" id="CharacterSpecies" placeholder="Enter Species" />
				
				<label for="SpeedInput" id="SpeedsLabel" >Speeds:</label>
				<div id="SpeedInput">
					<label for="walk" id="WalkLabel" >Walk:</label>
					<input type="number" name="walk" id="walk" min="0" value="30" />
					
					<label for="fly" id="FlyLabel" >Fly:</label>
					<input type="number" name="fly" id="fly" min="0" value="0" />
					
					<label for="climb" id="ClimbLabel" >Climb:</label>
					<input type="number" name="climb" id="climb" min="0" value="15" />
					
					<label for="swim" id="SwimLabel" >Swim:</label>
					<input type="number" name="swim" id="swim" min="0" value="15" />
					
					<label for="burrow" id="BurrowLabel" >Burrow:</label>
					<input type="number" name="burrow" id="burrow" min="0" value="0" />
				</div>
			
				<label for="CharacterBackground" id="CharacterBackgroundLabel" >Background:</label>
				<input name="charBackgroundTitle"  type="text" id="CharacterBackground" placeholder="Enter Background" />
				<textarea name="charBackgroundDetail"  id="BackgroundInfo" placeholder="Enter background feature info"></textarea>
				
			</div>
			
			<br>
		
		</div>
			
		<div class="CharacterInfoForm" id="CharacterAbilityInfo">
		
			<div id="ScoreLabels">
				<label>Ability Scores:</label><br>
				<label for="str">STR</label>
				<label for="dex">DEX</label>
				<label for="con">CON</label>
				<label for="int">INT</label>
				<label for="wis">WIS</label>
				<label for="cha">CHA</label>
			</div><br>
			
			<div id="ScoreInputs">
				<input type="number" name="str" id="str" min="0" max="30" value="10" />
				<input type="number" name="dex" id="dex" min="0" max="30" value="10" />
				<input type="number" name="con" id="con" min="0" max="30" value="10" />
				<input type="number" name="int" id="int" min="0" max="30" value="10" />
				<input type="number" name="wis" id="wis" min="0" max="30" value="10" />
				<input type="number" name="cha" id="cha" min="0" max="30" value="10" />
			</div><br><br>
			
			<div id="ScoreProficient">
				<label for="str_Prof">proficient:</label>
				<input type="checkbox" id="str_Prof" name="str_Prof"/>
				<label for="dex_Prof">proficient:</label>
				<input type="checkbox" id="dex_Prof" name="dex_Prof"/>
				<label for="con_Prof">proficient:</label>
				<input type="checkbox" id="con_Prof" name="con_Prof"/>
				<label for="intel_Prof">proficient:</label>
				<input type="checkbox" id="intel_Prof" name="intel_Prof"/>
				<label for="wis_Prof">proficient:</label>
				<input type="checkbox" id="wis_Prof" name="wis_Prof"/>
				<label for="cha_Prof">proficient:</label>
				<input type="checkbox" id="cha_Prof" name="cha_Prof"/>
			</div><br><br>
			
			<label>Skills Proficiencies:</label><br>
			<label>Skill | N/A | Proficient | Expertise</label><br>
			
			
			<label>Acrobatics |</label>
			<input type="radio" id="AcroNA" name="ACRO" value="N" checked />
			<label> | </label>
			<input type="radio" id="AcroProf" name="ACRO" value="P" />
			<label> | </label>
			<input type="radio" id="AcroExper" name="ACRO" value="E" /><br>
			
			<label>Animal Handling |</label>
			<input type="radio" id="AnHanNA" name="ANHAN" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="ANHAN" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="ANHAN" value="E" /><br>
			
			<label>Arcana |</label>
			<input type="radio" id="ArcaNA" name="ARCA" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="ARCA" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="ARCA" value="E" /><br>
			
			<label>Athletics |</label>
			<input type="radio" id="AthlNA" name="ATHL" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="ATHL" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="ATHL" value="E" /><br>
			
			<label>Deception |</label>
			<input type="radio" id="DeceNA" name="DECE" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="DECE" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="DECE" value="E" /><br>
			
			<label>History |</label>
			<input type="radio" id="HistNA" name="HIST" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="HIST" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="HIST" value="E" /><br>
			
			<label>Insight |</label>
			<input type="radio" id="InsiNA" name="INSI" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="INSI" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="INSI" value="E" /><br>
			
			<label>Intimidation |</label>
			<input type="radio" id="IntiNA" name="INTI" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="INTI" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="INTI" value="E" /><br>
			
			<label>Investigation |</label>
			<input type="radio" id="InvesNA" name="INVES" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="INVES" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="INVES" value="E" /><br>
			
			<label>Medicine |</label>
			<input type="radio" id="MediNA" name="MEDI" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="MEDI" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="MEDI" value="E" /><br>
			
			<label>Nature |</label>
			<input type="radio" id="NatuNA" name="NATU" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="NATU" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="NATU" value="E" /><br>
			
			<label>Perception |</label>
			<input type="radio" id="PercNA" name="PERC" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="PERC" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="PERC" value="E" /><br>
			
			<label>Performance |</label>
			<input type="radio" id="PerfNA" name="PERF" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="PERF" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="PERF" value="E" /><br>
			
			<label>Persuasion |</label>
			<input type="radio" id="PersNA" name="PERS" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="PERS" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="PERS" value="E" /><br>
			
			<label>Religion |</label>
			<input type="radio" id="ReliNA" name="RELI" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="RELI" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="RELI" value="E" /><br>
			
			<label>Slight Of Hand |</label>
			<input type="radio" id="SlohNA" name="SLOH" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="SLOH" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="SLOH" value="E" /><br>
			
			<label>Stealth |</label>
			<input type="radio" id="StelNA" name="STEL" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="STEL" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="STEL" value="E" /><br>
			
			<label>Survival |</label>
			<input type="radio" id="SurvNA" name="SURV" value="N" checked />
			<label> | </label>
			<input type="radio" id="Prof" name="SURV" value="P" />
			<label> | </label>
			<input type="radio" id="Exper" name="SURV" value="E" /><br>
		
		</div><br>
		
		<div class="CharacterInfoForm" id="CharacterItemProfsInfo">
			
			<label>Weapon/Armor Proficiencies:</label><br>
			<textarea name="charWepArmProf" id="WepArmProf" placeholder="Enter your weapon and armor proficiencies" cols="30" rows="5"></textarea><br><br>
			
			<label>Tool Proficiencies:</label><br>
			<textarea name="charToolProf" id="ToolProf" placeholder="Enter your tool proficiencies" cols="30" rows="5"></textarea><br><br>
			
			<label>Languages:</label><br>
			<textarea name="charLangProf" id="LangProf" placeholder="Enter your language proficiencies" cols="30" rows="5"></textarea><br><br>
			
			
		</div>
		
		<div class="CharacterInfoForm" id="CharacterClassInfo">
			
			<label>Class Abilities:</label><br>
			<textarea name="charClassAbility" id="ClassAbilities" placeholder="Enter your Class Abilities" cols="30" rows="5"></textarea><br><br>
			
			<label>Spellcasting:</label><br>
			<label>No | Yes</label><br>
			<input type="radio" id="spellsNo" name="spellcaster" value="N" checked />
			<input type="radio" id="spellsYes" name="spellcaster" value="Y" />
			
		</div>
	
	
	
	
	
	
	
	
	
		<!--button name="intent" value="save" onclick=getData() >Save</button-->
		<input type="submit" value="Save" />
	</form>





</body>

<!-- live site -->
<script type="module" src="characterInfo.js"></script>
